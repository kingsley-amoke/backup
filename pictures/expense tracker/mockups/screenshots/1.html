<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Receipts Instantly</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
 


    <style>
        .screenshot-card {
            width: 300px;
          
        }

        i.active{
            font-size:20px;
            color:white
        }

        </style>

        
        

</head>
<body>
    <!-- <div class="container"> -->
     <!-- <div class="screenshots-grid"></div> -->
            <!-- Screenshot 1: Scan Receipts -->
            <div class="screenshot-card" id="screenshot1">
                <div class="screenshot-header">
                    <h3>Scan Receipts Instantly</h3>
                    <p>Turn paper receipts into organized expenses</p>
                </div>
                <div class="phone-mockup">
                    <div class="phone-frame">
                        <div class="phone-notch"></div>
                        <div class="phone-screen">
                            <div class="screen-content">
                                <div class="status-bar">
                                    <span>9:41</span>
                                    <span>📶 🔋</span>
                                </div>
                                <div class="app-header">Scan Receipt</div>
                                <div class="app-body" style="position: relative; background: #2a2a2a;">
                                    <div class="receipt-preview" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-2deg); width: 80%;">
                                        <div style="font-weight: 700; margin-bottom: 12px;">Store Mart</div>
                                        <div style="font-size: 11px; color: #666; margin-bottom: 12px;">Groceries</div>
                                        <div style="border-top: 1px dashed #ccc; padding-top: 12px;">
                                            <div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px;">
                                                <span>Milk</span>
                                                <span>₦450</span>
                                            </div>
                                            <div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px;">
                                                <span>Bread</span>
                                                <span>₦600</span>
                                            </div>
                                            <div style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px;">
                                                <span>Eggs</span>
                                                <span>₦750</span>
                                            </div>
                                            <div style="border-top: 2px solid #333; margin-top: 12px; padding-top: 8px; display: flex; justify-content: space-between; font-weight: 700;">
                                                <span>Total:</span>
                                                <span>₦8,200</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="checkmark">✓</div>
                                    <div class="camera-button">
                                        <div class="camera-inner"></div>
                                    </div>
                                </div>
                                <div class="bottom-nav">
                                    <div class="nav-item active">
                                        <div class="nav-icon">
                                            <i class="fa fa-home active"></i>

                                        </div>
                                        
                                    </div>
                                    <div class="nav-item">
                                        <div class="nav-icon">
                                             <i class="fa fa-pie-chart "></i>
                                        </div>
                                        
                                    </div>
                                    <div class="nav-item">
                                        <div class="nav-icon">
                                             <i class="fa fa-trophy "></i>
                                        </div>
                                      
                                    </div>
                                    <div class="nav-item">
                                        <div class="nav-icon">
                                             <i class="fa fa-cog "></i>
                                        </div>
                                        
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
    <!-- </div> -->
</div>
</body>
</html>
